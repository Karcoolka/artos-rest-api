services:
  postgres:
    image: postgres:16-alpine
    container_name: artos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: artos
      POSTGRES_PASSWORD: artos
      POSTGRES_DB: artos
    volumes:
      - artos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artos -d artos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  artos_pg_data:
